.spec-jp td {

.spec-jp ul {

     <script>
    let images = [];
    let currentImageIndex = 0;

    function updateMainImage() {
      document.getElementById("mainImage").src = images[currentImageIndex];

      const thumbs = document.getElementsByClassName("thumb");
      for (let i = 0; i < thumbs.length; i++) {
        thumbs[i].classList.toggle("active", i === currentImageIndex);
      }
    }

    function nextImage() {
      currentImageIndex = (currentImageIndex + 1) % images.length;
      updateMainImage();
    }

    function prevImage() {
      currentImageIndex = (currentImageIndex - 1 + images.length) % images.length;
      updateMainImage();
    }

    function changeImage(index) {
      currentImageIndex = index;
      updateMainImage();
    }

    async function loadProduct() {
      const params = new URLSearchParams(window.location.search);
      const sku = params.get("sku");

      if (!sku) {
        alert("No SKU specified");
        return;
      }

      const response = await fetch("./data/product_detail.json");
      const products = await response.json();

      const product = products[sku];
      if (!product) {
        alert("Product not found: " + sku);
        return;
      }

      // Basic info
      document.getElementById("productName").textContent = product.name;
      document.getElementById("productTagline").textContent = product.tagline || "";
      document.getElementById("priceText").textContent = product.price_text || "";
      document.getElementById("productDescription").textContent = product.description2 || "";

      // Images
      images = product.images;
      currentImageIndex = 0;
      updateMainImage();

      const thumbContainer = document.getElementById("thumbContainer");
      thumbContainer.innerHTML = "";

      images.forEach((src, index) => {
        const col = document.createElement("div");
        col.className = "w3-col s3";

        const img = document.createElement("img");
        img.src = src;
        img.className = "w3-image w3-hover-opacity thumb" +
          (index === 0 ? " active" : "");
        img.onclick = () => changeImage(index);

        col.appendChild(img);
        thumbContainer.appendChild(col);
      });


      const specBody = document.getElementById("specTableBody");
      specBody.innerHTML = "";

      Object.values(product).forEach(field => {
        if (!field?.dt || !field?.dd) return;

        const row = document.createElement("tr");

        const th = document.createElement("th");
        th.textContent = field.dt;

        const td = document.createElement("td");

        // If dd is an array → bullet list
        if (Array.isArray(field.dd)) {
          const ul = document.createElement("ul");
          field.dd.forEach(item => {
            const li = document.createElement("li");
            li.textContent = item;
            ul.appendChild(li);
          });
          td.appendChild(ul);
        } else {
          td.innerHTML = field.dd;
          // td.textContent = field.dd;
        }

        row.appendChild(th);
        row.appendChild(td);
        specBody.appendChild(row);
      });




    }

    document.addEventListener("DOMContentLoaded", loadProduct);
  </script>
